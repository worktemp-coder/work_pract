name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask

      - name: Verify app.py exists
        run: |
          if [ ! -f app.py ]; then
            echo "ERROR: app.py not found"
            exit 1
          fi
          echo "app.py found"

      - name: Run Flask health check
        run: |
          python app.py &
          APP_PID=$!
          for i in {1..15}; do
            if curl -s http://localhost:5000/health > /dev/null; then
              echo "Flask is up"
              break
            fi
            echo "Waiting... attempt $i"
            sleep 1
          done
          RESPONSE=$(curl -s http://localhost:5000/health)
          echo "Response: $RESPONSE"
          if echo "$RESPONSE" | grep -q "status"; then
            echo "Health check passed"
          else
            echo "Health check failed"
            kill $APP_PID
            exit 1
          fi
          kill $APP_PID

      - name: Verify secret is configured
        env:
          APP_SECRET: ${{ secrets.MY_APP_SECRET }}
        run: |
          if [ -z "$APP_SECRET" ]; then
            echo "ERROR: MY_APP_SECRET is not configured"
            exit 1
          fi
          echo "Secret is configured"
          echo "Secret length: ${#APP_SECRET} characters"

  security-scan:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit SAST scan
        run: |
          bandit -r . \
            --exclude ./.git,./venv \
            --severity-level medium \
            --confidence-level medium \
            -f txt \
            -o bandit-report.txt || BANDIT_EXIT=$?
          cat bandit-report.txt
          exit ${BANDIT_EXIT:-0}

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.txt
